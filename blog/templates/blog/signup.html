{% extends 'blog/base.html' %}
{% block content %}
{% load static %}

<div class="container">
<div class="row">
<div class="col-md-6 offset-md-3">
<br><br><br><br>

<div class="card my-5" style="background-color: #59b0fc";>

<form method="POST" class="card-body cardbody-color p-lg-5">
{% csrf_token %}

<div class="text-center">
<h2>Create An Account</h2>
</div>

<br>

<div class="mb-3">
<input type="text" class="form-control" name="uname" placeholder="Your Name">
</div>

<div class="mb-3">
<input type="email" class="form-control" name="uemail" placeholder="Your Email">
</div>

<div class="mb-3">
<input type="password" class="form-control" name="upassword" placeholder="Password">
</div>

<br>

<div class="text-center">
<button type="submit" class="btn btn-primary px-5 mb-5 w-100">
Sign Up
</button>
</div>

<div class="form-text text-center mb-5 text-dark">
Have already an account?
<a href="{% url 'login' %}" class="text-dark fw-bold">Login Here</a>
</div>

</form>

</div>
</div>
</div>
</div>

{% endblock %}
